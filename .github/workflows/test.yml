concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}
name: Test workflow
on:
  push:
    branches:
      - '**'
      - '!main'
  pull_request:
permissions:
  contents: read
jobs:
  bash-tests:
    name: Bash tests (bats)
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Run bats tests
        run: tests/bash/helpers/bats-core/bin/bats tests/bash/

  powershell-tests:
    name: PowerShell tests (Pester)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Pester if needed
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable Pester |
              Where-Object { $_.Version -ge [version]'5.0' })) {
            Install-Module Pester -MinimumVersion 5.0 -Force -SkipPublisherCheck
          }
      - name: Run Pester tests
        shell: pwsh
        run: Invoke-Pester tests/powershell/ -Output Detailed

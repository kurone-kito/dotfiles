concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}
name: Test workflow
on:
  push:
    branches:
      - '**'
  pull_request:
permissions:
  contents: read
jobs:
  detect-changes:
    name: Detect docs-only changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      requires_full_ci: ${{ steps.resolve.outputs.value }}
    steps:
      - uses: actions/checkout@v7
      - name: TEMPORARY deliberate failure for #198 fail-safe verification
        run: exit 1
      # Only meaningful for pull_request events, which paths-filter
      # resolves via the GitHub API (a reliable full PR-vs-base diff,
      # regardless of how many commits are in the PR). Deliberately
      # not attempted for push events: there is no single correct
      # "previous state" to diff against for an arbitrary branch name
      # (a self-referential base like the branch's own ref falls back
      # to a merge-base-with-master diff, which pulls in the entire
      # branch history instead of just this push's changes; a fresh
      # branch's first push also has no prior commit to diff at all).
      # Push events simply always require full CI below instead.
      - uses: dorny/paths-filter@v4
        id: filter
        if: github.event_name == 'pull_request'
        with:
          predicate-quantifier: every
          filters: |
            requires_full_ci:
              - '**'
              - '!docs/**'
              - '!**/*.md'
      - name: Resolve requires_full_ci
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "value=${{ steps.filter.outputs.requires_full_ci }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=true" >> "$GITHUB_OUTPUT"
          fi

  bash-tests:
    name: Bash tests (bats)
    needs: detect-changes
    # always() overrides the default "skip if a need failed" behavior
    # so a failed/cancelled detect-changes fails open to running the
    # real job, rather than silently skipping it (which would satisfy
    # the required-status-check gate without ever having run).
    if: |
      always() &&
      (needs.detect-changes.result != 'success' || needs.detect-changes.outputs.requires_full_ci == 'true')
    runs-on: ubuntu-latest
    env:
      CHEZMOI_VERSION: v2.71.0
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - name: Cache chezmoi binary
        id: cache-chezmoi
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/chezmoi
          key: chezmoi-${{ runner.os }}-${{ runner.arch }}-${{ env.CHEZMOI_VERSION }}
      - name: Install chezmoi
        if: steps.cache-chezmoi.outputs.cache-hit != 'true'
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin" -t "$CHEZMOI_VERSION"
      - name: Ensure chezmoi on PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install zsh if missing
        run: |
          if ! command -v zsh >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends zsh
          fi
      - name: Run bats tests
        run: tests/bash/helpers/bats-core/bin/bats tests/bash/

  powershell-tests:
    name: PowerShell tests (Pester)
    needs: detect-changes
    # always() overrides the default "skip if a need failed" behavior
    # so a failed/cancelled detect-changes fails open to running the
    # real job, rather than silently skipping it (which would satisfy
    # the required-status-check gate without ever having run).
    if: |
      always() &&
      (needs.detect-changes.result != 'success' || needs.detect-changes.outputs.requires_full_ci == 'true')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Pester if needed
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable Pester |
              Where-Object { $_.Version -ge [version]'5.0' })) {
            Install-Module Pester -MinimumVersion 5.0 -Force -SkipPublisherCheck
          }
      - name: Run Pester tests
        shell: pwsh
        run: Invoke-Pester tests/powershell/ -Output Detailed

  lua-syntax:
    name: Lua syntax check
    needs: detect-changes
    # always() overrides the default "skip if a need failed" behavior
    # so a failed/cancelled detect-changes fails open to running the
    # real job, rather than silently skipping it (which would satisfy
    # the required-status-check gate without ever having run).
    if: |
      always() &&
      (needs.detect-changes.result != 'success' || needs.detect-changes.outputs.requires_full_ci == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Lua
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends lua5.1
      - name: Check Lua syntax
        shell: bash
        run: |
          if [ ! -d home/dot_config/nvim ]; then
            echo "::error::home/dot_config/nvim directory not found"
            exit 1
          fi

          errors=0
          checked=0
          while IFS= read -r -d '' f; do
            checked=$((checked + 1))
            if ! luac -p "$f"; then
              errors=$((errors + 1))
            fi
          done < <(find home/dot_config/nvim -name '*.lua' -print0)

          echo "Checked $checked Lua file(s)"

          if [ "$checked" -eq 0 ]; then
            echo "::error::No Lua files found under home/dot_config/nvim"
            exit 1
          fi
          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors Lua file(s) have syntax errors"
            exit 1
          fi

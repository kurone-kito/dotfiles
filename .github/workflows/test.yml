concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}
name: Test workflow
on:
  push:
    branches:
      - '**'
  pull_request:
permissions:
  contents: read
jobs:
  detect-changes:
    name: Detect docs-only changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      requires_full_ci: ${{ steps.filter.outputs.requires_full_ci }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          # Ignored on pull_request events (uses the GitHub API for the
          # PR's file list there); used to diff against the previous
          # commit on the same branch for push events.
          base: ${{ github.ref }}
          predicate-quantifier: every
          filters: |
            requires_full_ci:
              - '**'
              - '!docs/**'
              - '!**/*.md'

  bash-tests:
    name: Bash tests (bats)
    needs: detect-changes
    if: needs.detect-changes.outputs.requires_full_ci == 'true'
    runs-on: ubuntu-latest
    env:
      CHEZMOI_VERSION: v2.71.0
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - name: Cache chezmoi binary
        id: cache-chezmoi
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/chezmoi
          key: chezmoi-${{ runner.os }}-${{ runner.arch }}-${{ env.CHEZMOI_VERSION }}
      - name: Install chezmoi
        if: steps.cache-chezmoi.outputs.cache-hit != 'true'
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin" -t "$CHEZMOI_VERSION"
      - name: Ensure chezmoi on PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install zsh if missing
        run: |
          if ! command -v zsh >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends zsh
          fi
      - name: Run bats tests
        run: tests/bash/helpers/bats-core/bin/bats tests/bash/

  powershell-tests:
    name: PowerShell tests (Pester)
    needs: detect-changes
    if: needs.detect-changes.outputs.requires_full_ci == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Pester if needed
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable Pester |
              Where-Object { $_.Version -ge [version]'5.0' })) {
            Install-Module Pester -MinimumVersion 5.0 -Force -SkipPublisherCheck
          }
      - name: Run Pester tests
        shell: pwsh
        run: Invoke-Pester tests/powershell/ -Output Detailed

  lua-syntax:
    name: Lua syntax check
    needs: detect-changes
    if: needs.detect-changes.outputs.requires_full_ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Lua
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends lua5.1
      - name: Check Lua syntax
        shell: bash
        run: |
          if [ ! -d home/dot_config/nvim ]; then
            echo "::error::home/dot_config/nvim directory not found"
            exit 1
          fi

          errors=0
          checked=0
          while IFS= read -r -d '' f; do
            checked=$((checked + 1))
            if ! luac -p "$f"; then
              errors=$((errors + 1))
            fi
          done < <(find home/dot_config/nvim -name '*.lua' -print0)

          echo "Checked $checked Lua file(s)"

          if [ "$checked" -eq 0 ]; then
            echo "::error::No Lua files found under home/dot_config/nvim"
            exit 1
          fi
          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors Lua file(s) have syntax errors"
            exit 1
          fi

# psmux checks ~/.psmux.conf before ~/.tmux.conf, so use this thin wrapper
# to keep the shared tmux config intact and layer psmux-only options after it.
source-file -q ~/.tmux.conf

# Reload the wrapper so shared tmux settings and psmux-specific settings are
# both refreshed inside a psmux session.
unbind r
bind r source-file ~/.psmux.conf

# psmux disables PSReadLine predictions by default; preserve the user's
# PowerShell prediction settings inside panes.
set -g allow-predictions on

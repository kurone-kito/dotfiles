allow-loopback-pinentry
# 24h TTL: suppress pinentry popups during long AI-assisted coding
# sessions. Run gpg-cache once per session so background operations
# (VS Code, git hooks, scripts) can sign without prompts.
# See 05-gpg.ps1/.sh for the cache-priming helper.
default-cache-ttl 86400
max-cache-ttl 86400
{{- if ne .chezmoi.os "windows" }}
pinentry-program "{{ .chezmoi.homeDir }}/.gnupg/pinentry-auto"
{{- end }}
